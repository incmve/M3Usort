{% extends 'layout.html' %}
{% block content %}
<div class="topbar">
    <span class="topbar-title">Series</span>
    <div class="topbar-right">
        <span class="topbar-pill" style="color:#5abf7e; border-color:#1a4a30; background:#0a2018;">{{ series|length }} series</span>
        {% if cache_age %}<span class="topbar-pill" style="color:#5abf7e; border-color:#1a4a30; background:#0a2018;">Cache {{ cache_age }} ago</span>{% endif %}
        <a href="{{ url_for('main_bp.refresh_vod_cache') }}" class="topbar-btn">↻ Refresh</a>
    </div>
</div>
<div class="page-content">
    <div style="display:grid; grid-template-columns:1fr 280px; gap:20px; align-items:start;">
        <div>
            <div class="filter-bar">
                <input type="text" class="filter-input" id="search-bar" placeholder="Search series..." onkeyup="filterSeries()">
                <select id="category-filter" class="filter-select" onchange="filterSeries()">
                    <option value="">All categories</option>
                    {% for cat in categories %}<option value="{{ cat }}">{{ cat }}</option>{% endfor %}
                </select>
                <div class="view-toggle">
                    <button class="vt-btn" id="btn-list" onclick="setView('list')" title="List view">≡</button>
                    <button class="vt-btn active" id="btn-grid" onclick="setView('grid')" title="Poster view">⊞</button>
                </div>
            </div>

            <div id="count-bar" style="font-size:12px; color:#444; margin-bottom:10px;"></div>
            <div id="view-grid"><div class="poster-grid" id="series-grid"></div><div id="grid-load-more" style="text-align:center; padding:16px; display:none;"><button class="button" onclick="loadMoreGrid()">Load more</button></div></div>
            <div id="view-list" style="display:none;"><div class="list-view" id="series-list-view"></div><div id="list-load-more" style="text-align:center; padding:16px; display:none;"><button class="button" onclick="loadMoreList()">Load more</button></div></div>
        </div>

        <div>
            <div class="info-block">
                <div class="info-block-header">Watchlist</div>
                <div style="padding:14px;">
                    <form method="POST" action="{{ url_for('main_bp.add_wanted_serie') }}">
                        <input type="text" class="filter-input" name="wanted_serie" placeholder="Add to watchlist..." style="width:100%; margin-bottom:8px;">
                        <button type="submit" class="button button-primary" style="width:100%;">Add</button>
                    </form>
                    <ul id="wanted-series-list" style="margin-top:12px;">
                        {% for s in wanted_series %}
                        <li style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #181818;font-size:13px;color:#888;">
                            <a href="javascript:void(0)" class="wanted-serie-link" data-serie-name="{{ s }}" style="color:#a04040;text-decoration:none;font-size:16px;">✕</a>
                            {{ s }}
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const ALL_SERIES = {{ series | tojson }};
const PAGE_SIZE = 120;
let filteredSeries = ALL_SERIES;
let gridPage = 0, listPage = 0;
let currentView = localStorage.getItem('series_view') || 'grid';

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function renderGrid(items, append) {
    const grid = document.getElementById('series-grid');
    if (!append) { grid.innerHTML = ''; gridPage = 0; }
    items.slice(gridPage * PAGE_SIZE, (gridPage+1) * PAGE_SIZE).forEach(m => {
        const d = document.createElement('div');
        d.className = 'poster-card';
        d.innerHTML = `<div class="poster-img">${m.series_cover?`<img src="${m.series_cover}" loading="lazy" onerror="this.style.display='none'">`:'📺'}</div><div class="poster-name" title="${escHtml(m.name)}">${escHtml(m.name)}</div><div class="poster-meta">${escHtml(m.category||'')}</div>`;
        d.onclick = () => openSerieModal(m);
        grid.appendChild(d);
    });
    document.getElementById('grid-load-more').style.display = (gridPage+1)*PAGE_SIZE < items.length ? '' : 'none';
}
function renderList(items, append) {
    const list = document.getElementById('series-list-view');
    if (!append) { list.innerHTML = ''; listPage = 0; }
    items.slice(listPage * PAGE_SIZE, (listPage+1) * PAGE_SIZE).forEach(m => {
        const d = document.createElement('div');
        d.className = 'list-row';
        d.innerHTML = `<div class="list-thumb">${m.series_cover?`<img src="${m.series_cover}" loading="lazy" onerror="this.style.display='none'">`:'📺'}</div><div><div class="list-name">${escHtml(m.name)}</div><div class="list-sub">${escHtml(m.category||'')}</div></div>`;
        d.onclick = () => openSerieModal(m);
        list.appendChild(d);
    });
    document.getElementById('list-load-more').style.display = (listPage+1)*PAGE_SIZE < items.length ? '' : 'none';
}
function loadMoreGrid() { gridPage++; renderGrid(filteredSeries, true); }
function loadMoreList() { listPage++; renderList(filteredSeries, true); }

function setView(v) {
    currentView = v; localStorage.setItem('series_view', v);
    document.getElementById('view-grid').style.display = v==='grid'?'':'none';
    document.getElementById('view-list').style.display = v==='list'?'':'none';
    document.getElementById('btn-grid').className = v==='grid'?'vt-btn active':'vt-btn';
    document.getElementById('btn-list').className = v==='list'?'vt-btn active':'vt-btn';
}
function filterSeries() {
    const words = document.getElementById('search-bar').value.toLowerCase().trim().split(/\s+/).filter(Boolean);
    const cat = document.getElementById('category-filter').value;
    filteredSeries = ALL_SERIES.filter(m => {
        const name = (m.name||'').toLowerCase();
        const matchName = words.length === 0 || words.every(w => name.includes(w));
        return matchName && (!cat || (m.category||'')===cat);
    });
    document.getElementById('count-bar').textContent = `${filteredSeries.length} series`;
    renderGrid(filteredSeries, false);
    renderList(filteredSeries, false);
}
function hideFlash(){document.querySelectorAll('.flash-message').forEach(m=>{if(!m.classList.contains('static')){setTimeout(()=>{m.style.opacity='0';setTimeout(()=>m.remove(),600);},5000);}});}
function addSerieToServer(serieName,serieId){
    fetch('{{ url_for("main_bp.add_series_to_server") }}',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({serieName,serieId})})
    .then(r=>r.json()).then(data=>{const c=document.querySelector('.flash-wrap');if(c){const d=document.createElement('div');d.textContent=data.message;d.className='flash-message info';c.appendChild(d);hideFlash();}});
}
function RemoveWantedSerie(serieName){
    fetch('{{ url_for("main_bp.remove_wanted_serie") }}',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({serieName})}).then(()=>location.reload());
}
function renderModalInfo(data, title, type, modalLinks) {
    let metaHtml = '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:4px;">';
    if (data.rating) metaHtml += `<span style="color:#c8a030;font-weight:600;">★ ${parseFloat(data.rating).toFixed(1)}</span>`;
    metaHtml += `<span id="jf-status" style="font-size:12px;color:#444;">⏳ Checking Jellyfin...</span>`;
    metaHtml += '</div>';
    let btns = '';
    if (data.tmdb_id) {
        const tmdbType = type === 'movie' ? 'movie' : 'tv';
        btns += `<a href="https://www.themoviedb.org/${tmdbType}/${data.tmdb_id}" target="_blank" class="button" style="margin-right:8px;">TMDB</a>`;
    }
    if (data.imdb_id) btns += `<a href="https://www.imdb.com/title/${data.imdb_id}" target="_blank" class="button" style="margin-right:8px;">IMDB</a>`;
    if (!data.tmdb_id && !data.imdb_id) btns += `<a href="https://www.themoviedb.org/search?query=${encodeURIComponent(title)}" target="_blank" class="button">Search TMDB</a>`;
    let descHtml = '';
    if (data.plot) {
        const short = data.plot.length > 180 ? data.plot.substring(0, 180) + '...' : data.plot;
        descHtml = `<div style="color:#777;line-height:1.5;border-top:1px solid #1e1e1e;padding-top:8px;margin-top:4px;font-size:13px;">`;
        if (data.plot.length > 180) {
            descHtml += `<span id="desc-short">${short} <span onclick="document.getElementById('desc-short').style.display='none';document.getElementById('desc-full').style.display='block';" style="color:#4aadcf;cursor:pointer;font-size:11px;">more</span></span>`;
            descHtml += `<span id="desc-full" style="display:none;">${data.plot} <span onclick="document.getElementById('desc-full').style.display='none';document.getElementById('desc-short').style.display='block';" style="color:#4aadcf;cursor:pointer;font-size:11px;">less</span></span>`;
        } else {
            descHtml += short;
        }
        descHtml += '</div>';
    }
    modalLinks.innerHTML = metaHtml + btns + descHtml;
}
function checkJellyfin(name, type) {
    const encoded = encodeURIComponent(name);
    fetch(`{{ url_for('main_bp.check_jellyfin', type='movie', name='placeholder') }}`.replace('movie', type).replace('placeholder', encoded))
        .then(r => r.json())
        .then(data => {
            const el = document.getElementById('jf-status');
            if (el) {
                el.textContent = data.exists ? '✅ In Jellyfin' : '❌ Not in Jellyfin';
                el.style.color = data.exists ? '#3a8a5a' : '#a04040';
            }
        })
        .catch(() => { const el = document.getElementById('jf-status'); if (el) el.style.display = 'none'; });
}
function loadSerieInfo(serieId, cover, serieName) {
    const modalImage = document.getElementById('modal-image');
    const modalLinks = document.getElementById('modal-links');
    modalImage.innerHTML = cover ? `<img src="${cover}" style="max-width:100%;max-height:260px;display:block;border-radius:6px;">` : '';
    modalLinks.innerHTML = `<span style="color:#555;font-size:12px;">Loading info...</span>`;
    fetch(`{{ url_for('main_bp.get_series_info_meta', series_id=0) }}`.replace('/0', `/${serieId}`))
        .then(r => r.json())
        .then(data => {
            renderModalInfo(data, serieName, 'serie', modalLinks);
            checkJellyfin(serieName, 'serie');
        })
        .catch(() => { modalLinks.innerHTML = ''; });
}
function openSerieModal(serie) {
    const modal = document.getElementById('myModal');
    document.getElementById('modal-text').textContent = `Add Series '${serie.name}'?`;
    modal.style.display = 'block';
    loadSerieInfo(serie.series_id, serie.series_cover, serie.name);
    document.getElementById('confirmBtn').onclick = function() { closeModal(); addSerieToServer(serie.name, serie.series_id); };
}
function closeModal(){document.getElementById('modal-image').innerHTML='';document.getElementById('modal-links').innerHTML='';document.getElementById('myModal').style.display='none';}
document.addEventListener('DOMContentLoaded',function(){
    filterSeries();
    setView(currentView);
    document.querySelectorAll('.wanted-serie-link').forEach(link=>{
        link.addEventListener('click',function(){
            const n=this.getAttribute('data-serie-name');
            document.getElementById('modal-text').textContent=`Remove '${n}' from watchlist?`;
            document.getElementById('modal-image').innerHTML=''; document.getElementById('modal-links').innerHTML='';
            document.getElementById('myModal').style.display='block';
            document.getElementById('confirmBtn').onclick=function(){closeModal();RemoveWantedSerie(n);};
        });
    });
    document.getElementById('cancelBtn').onclick=closeModal;
    document.querySelector('.close').onclick=closeModal;
    window.onclick=function(e){if(e.target===document.getElementById('myModal'))closeModal();};
    document.getElementById('modal-image').addEventListener('click',function(e){if(e.target.tagName==='IMG'){const lb=document.getElementById('lightbox');document.getElementById('lightbox-img').src=e.target.src;lb.style.display='flex';}});
    document.getElementById('lightbox').addEventListener('click',function(){this.style.display='none';});
    document.addEventListener('keydown',function(e){if(e.key==='Escape'){document.getElementById('lightbox').style.display='none';document.getElementById('myModal').style.display='none';}});
});
</script>

{% endblock %}
