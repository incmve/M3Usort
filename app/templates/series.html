{% extends 'layout.html' %}

{% block content %}

<div class="container">
    <div class="row">
        <div class="eight columns">
            <h4>Search and save series</h4>
            <div id="main">
                <div class="search-container">
                    <input type="text" class="u-full-width" id="search-bar" placeholder="Search series..."
                        onkeyup="searchSeries()">
                </div>
                <ul id="series-list">
                    {% for serie in series %}
                    <li><a href="javascript:void(0)" class="serie-link" data-serie-name="{{ serie.name }}" data-serie-id="{{ serie.series_id }}" data-serie-cover="{{ serie.series_cover }}">{{ serie.name }}</a></li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <div class="four columns">
            <div id="main">
                <h4>Watchlist</h4>
                <div>
                    <form method="POST" action="{{ url_for('main_bp.add_wanted_serie') }}">
                        <input type="text" class="u-full-width" id="wanted_serie" name="wanted_serie"
                            placeholder="Add serie to watchlist">
                    </form>
                </div>
                <ul id="wanted-series-list">
                    {% for wanted_serie in wanted_series %}
                    <li> <a href="javascript:void(0)" class="wanted-serie-link" style="text-decoration: none;"
                            data-serie-name="{{ wanted_serie }}">&#10060;</a> {{ wanted_serie }}
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    function hideFlashMessagesAfterDelay() {
        const flashMessages = document.querySelectorAll('.flash-message');
        flashMessages.forEach(flashMessage => {
            if (!flashMessage.classList.contains('static')) {
                setTimeout(() => {
                    flashMessage.style.opacity = '0';
                    setTimeout(() => flashMessage.remove(), 600);
                }, 5000);
            }
        });
    }

    function addSerieToServer(serieName, serieId) {
        fetch('{{ url_for("main_bp.add_series_to_server") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ serieName, serieId }),
        })
        .then(response => response.json())
        .then(data => {
            var container = document.getElementById('flash-messages-container');
            var div = document.createElement('div');
            div.textContent = data.message;
            div.className = 'flash-message info';
            container.appendChild(div);
            hideFlashMessagesAfterDelay();
        })
        .catch(error => console.error('Error:', error));
    }

    function RemoveWantedSerie(serieName) {
        fetch('{{ url_for("main_bp.remove_wanted_serie") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ serieName }),
        })
        .then(response => response.json())
        .then(data => {
            location.reload();
            var container = document.getElementById('flash-messages-container');
            var div = document.createElement('div');
            div.textContent = data.message;
            div.className = 'flash-message info';
            container.appendChild(div);
            hideFlashMessagesAfterDelay();
        })
        .catch(error => console.error('Error:', error));
    }

    function loadSerieInfo(serieId, cover) {
        const modalImage = document.getElementById("modal-image");
        const modalLinks = document.getElementById("modal-links");

        modalImage.innerHTML = cover ? `<img src="${cover}" style="max-width: 100%; max-height: 400px; display: block; margin: 0 auto;">` : '';
        modalLinks.innerHTML = `<span style="color:#999; font-size:0.85em;">Loading info...</span>`;

        fetch(`{{ url_for('main_bp.get_series_info_meta', series_id=0) }}`.replace('/0', `/${serieId}`))
            .then(r => r.json())
            .then(data => {
                let pageUrl = null;
                let btns = '';
                if (data.tmdb_id) {
                    pageUrl = `https://www.themoviedb.org/tv/${data.tmdb_id}`;
                    btns += `<a href="${pageUrl}" target="_blank" class="button" style="margin-right:8px;">TMDB</a>`;
                }
                if (data.imdb_id) {
                    if (!pageUrl) pageUrl = `https://www.imdb.com/title/${data.imdb_id}`;
                    btns += `<a href="https://www.imdb.com/title/${data.imdb_id}" target="_blank" class="button">IMDB</a>`;
                }
                modalLinks.innerHTML = btns || '';
            })
            .catch(() => { modalLinks.innerHTML = ''; });
    }

    document.addEventListener('DOMContentLoaded', function () {
        const modal = document.getElementById("myModal");
        const modalText = document.getElementById("modal-text");
        const modalImage = document.getElementById("modal-image");
        const modalLinks = document.getElementById("modal-links");
        const confirmBtn = document.getElementById("confirmBtn");
        const cancelBtn = document.getElementById("cancelBtn");
        const span = document.getElementsByClassName("close")[0];

        function closeModal() {
            modalImage.innerHTML = '';
            modalLinks.innerHTML = '';
            modal.style.display = "none";
        }

        document.querySelectorAll('.serie-link').forEach(link => {
            link.addEventListener('click', function () {
                const serieName = this.getAttribute('data-serie-name');
                const serieId = this.getAttribute('data-serie-id');
                const serieCover = this.getAttribute('data-serie-cover');
                modalText.innerHTML = `Are you sure you want to add Serie '${serieName}'?`;
                modal.style.display = "block";
                loadSerieInfo(serieId, serieCover);
                confirmBtn.onclick = function () {
                    closeModal();
                    addSerieToServer(serieName, serieId);
                };
            });
        });

        document.querySelectorAll('.wanted-serie-link').forEach(link => {
            link.addEventListener('click', function () {
                const serieName = this.getAttribute('data-serie-name');
                modalText.innerHTML = `Are you sure you want to remove '${serieName}' from the wanted list?`;
                modalImage.innerHTML = "";
                modalLinks.innerHTML = "";
                modal.style.display = "block";
                confirmBtn.onclick = function () {
                    closeModal();
                    RemoveWantedSerie(serieName);
                };
            });
        });

        cancelBtn.onclick = closeModal;
        span.onclick = closeModal;
        window.onclick = function (event) {
            if (event.target == modal) closeModal();
        };
    });

        document.getElementById('modal-image').addEventListener('click', function (e) {
            if (e.target.tagName === 'IMG') {
                const lb = document.getElementById('lightbox');
                document.getElementById('lightbox-img').src = e.target.src;
                lb.style.display = 'flex';
            }
        });
        document.getElementById('lightbox').addEventListener('click', function () {
            this.style.display = 'none';
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') document.getElementById('lightbox').style.display = 'none';
        });
    });

    function searchSeries() {
        let input = document.getElementById('search-bar').value.toLowerCase();
        document.querySelectorAll('#series-list li').forEach(item => {
            let name = item.textContent || item.innerText;
            item.style.display = name.toLowerCase().includes(input) ? '' : 'none';
        });
    }
</script>
{% endblock %}
