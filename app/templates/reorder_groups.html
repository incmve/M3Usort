{% extends 'layout.html' %}
{% block content %}
<div class="topbar"><span class="topbar-title">Sort Groups</span></div>
<div class="page-content">
    <form method="POST" action="{{ url_for('main_bp.save_reordered_groups') }}">
        <div style="margin-bottom:16px;">
            <button type="submit" class="button button-primary">Save Order</button>
        </div>
        <input type="hidden" id="group_order" name="group_order">
        <ul id="sortable" style="margin:0; padding:0; list-style:none;">
            {% for group in desired_group_titles %}
            <li class="draggable-item" draggable="true" data-group="{{ group }}">
                <span class="drag-handle">&#x2630;</span>
                {{ group }}
                <a href="#" class="delete-btn" onclick="deleteItem(this)">✕</a>
            </li>
            {% endfor %}
        </ul>
    </form>
</div>
<script>
let ul = document.getElementById('sortable');
window.updateOrderInput = function() {
    let order = [];
    ul.querySelectorAll('.draggable-item').forEach(item => order.push(item.getAttribute('data-group')));
    document.getElementById('group_order').value = JSON.stringify(order);
}
document.addEventListener('DOMContentLoaded', function() {
    let dragging = null;
    ul.querySelectorAll('.draggable-item').forEach(item => {
        item.addEventListener('dragstart', e => { dragging = item; });
        item.addEventListener('dragover', e => {
            e.preventDefault();
            const closest = [...ul.querySelectorAll('.draggable-item')].reduce((c, child) => {
                const box = child.getBoundingClientRect();
                const offset = e.clientY - box.top - box.height/2;
                if (offset < 0 && offset > c.offset) return {offset, element: child};
                return c;
            }, {offset: Number.NEGATIVE_INFINITY}).element;
            if (closest && dragging !== closest) { ul.insertBefore(dragging, closest.nextSibling); updateOrderInput(); }
        });
        item.addEventListener('dragend', () => updateOrderInput());
    });
    updateOrderInput();
});
window.deleteItem = function(el) { el.closest('.draggable-item').remove(); updateOrderInput(); }
</script>
{% endblock %}
