{% extends 'layout.html' %}
{% block content %}
<div class="topbar"><span class="topbar-title">Sort Channels</span></div>
<div class="page-content">
    <form method="POST" action="{{ url_for('main_bp.save_reordered_channels') }}">
        <div style="margin-bottom:16px;">
            <button type="submit" class="button button-primary">Save Order</button>
        </div>
        <input type="hidden" id="channel_order" name="channel_order">
        <ul id="channels-list" style="margin:0; padding:0; list-style:none;">
            {% for channel_name in channel_names %}
            <li class="draggable-item" draggable="true" data-channel="{{ channel_name }}">
                <span class="drag-handle">&#x2630;</span>
                {{ channel_name }}
                <a href="#" class="delete-btn" onclick="deleteItem(this)">✕</a>
            </li>
            {% endfor %}
        </ul>
    </form>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const list = document.getElementById('channels-list');
    let dragging;
    const updateOrder = () => {
        const order = Array.from(list.querySelectorAll('.draggable-item')).map(i => i.getAttribute('data-channel'));
        document.getElementById('channel_order').value = JSON.stringify(order);
    };
    list.addEventListener('dragstart', e => { dragging = e.target; });
    list.addEventListener('dragover', e => {
        e.preventDefault();
        const after = Array.from(list.querySelectorAll('.draggable-item:not(.dragging)')).reduce((c, child) => {
            const box = child.getBoundingClientRect();
            const offset = e.clientY - box.top - box.height/2;
            if (offset < 0 && offset > c.offset) return {offset, element: child};
            return c;
        }, {offset: Number.NEGATIVE_INFINITY}).element;
        if (after == null) list.appendChild(dragging); else list.insertBefore(dragging, after);
    });
    list.addEventListener('dragend', updateOrder);
    window.deleteItem = btn => { btn.closest('li').remove(); updateOrder(); };
    updateOrder();
});
</script>
{% endblock %}
