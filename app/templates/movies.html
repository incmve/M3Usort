{% extends 'layout.html' %}

{% block content %}

<div class="container">
    <div class="row">
        <div class="eight columns">
            <h4>Search and save movies</h4>
            <div id="main">
                <div class="search-container">
                    <input type="text" class="u-full-width" id="search-bar" placeholder="Search movies..."
                        onkeyup="searchMovies()">
                </div>
                <ul id="movies-list">
                    {% for movie in movies %}
                    <li><a href="#" class="movie-link" data-movie-name="{{ movie.name }}"
                            data-movie-id="{{ movie.stream_id }}" data-movie-icon="{{ movie.stream_icon }}">{{
                            movie.name }}</a></li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <div class="four columns">
            <div id="main">
                <h4>Watchlist</h4>
                <div>
                    <form method="POST" action="{{ url_for('main_bp.add_wanted_movie') }}">
                        <input type="text" class="u-full-width" id="wanted_movie" name="wanted_movie"
                            placeholder="Add movie to watchlist">
                    </form>
                </div>
                <ul id="wanted-movies-list">
                    {% for wanted_movie in wanted_movies %}
                    <li> <a href="javascript:void(0)" class="wanted-movie-link" style="text-decoration: none;"
                            data-movie-name="{{ wanted_movie }}">&#10060;</a> {{ wanted_movie }}
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>

<div id="player"></div>

<script>
    function hideFlashMessagesAfterDelay() {
        const flashMessages = document.querySelectorAll('.flash-message');
        flashMessages.forEach(flashMessage => {
            if (!flashMessage.classList.contains('static')) {
                setTimeout(() => {
                    flashMessage.style.opacity = '0';
                    setTimeout(() => flashMessage.remove(), 600);
                }, 5000);
            }
        });
    }

    function addMovieToServer(movieName, movieId) {
        fetch('{{ url_for("main_bp.add_movie_to_server") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ movieName, movieId }),
        })
        .then(response => response.json())
        .then(data => {
            var container = document.getElementById('flash-messages-container');
            var div = document.createElement('div');
            div.textContent = data.message;
            div.className = 'flash-message info';
            container.appendChild(div);
            hideFlashMessagesAfterDelay();
        })
        .catch(error => console.error('Error:', error));
    }

    function RemoveWantedMovie(movieName) {
        fetch('{{ url_for("main_bp.remove_wanted_movie") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ movieName }),
        })
        .then(response => response.json())
        .then(data => {
            location.reload();
            var container = document.getElementById('flash-messages-container');
            var div = document.createElement('div');
            div.textContent = data.message;
            div.className = 'flash-message info';
            container.appendChild(div);
            hideFlashMessagesAfterDelay();
        })
        .catch(error => console.error('Error:', error));
    }

    function renderModalInfo(data, title, type, modalLinks) {
        let metaHtml = '<div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:4px;">';
        if (data.rating) {
            metaHtml += `<span style="color:#f5c518; font-weight:bold;">⭐ ${parseFloat(data.rating).toFixed(1)}</span>`;
        }
        metaHtml += `<span id="jf-status" style="font-size:0.85rem; color:#888;">⏳ Checking Jellyfin...</span>`;
        metaHtml += '</div>';

        let btns = '';
        if (data.tmdb_id) {
            const tmdbType = type === 'movie' ? 'movie' : 'tv';
            btns += `<a href="https://www.themoviedb.org/${tmdbType}/${data.tmdb_id}" target="_blank" class="button" style="margin-right:8px;">TMDB</a>`;
        }
        if (data.imdb_id) {
            btns += `<a href="https://www.imdb.com/title/${data.imdb_id}" target="_blank" class="button" style="margin-right:8px;">IMDB</a>`;
        }
        if (!data.tmdb_id && !data.imdb_id) {
            btns += `<a href="https://www.themoviedb.org/search?query=${encodeURIComponent(title)}" target="_blank" class="button">Search TMDB</a>`;
        }

        let descHtml = '';
        if (data.plot) {
            const short = data.plot.length > 180 ? data.plot.substring(0, 180) + '...' : data.plot;
            const hasMore = data.plot.length > 180;
            descHtml = `<div style="font-size:0.83rem; color:#aaa; line-height:1.5; border-top:1px solid #3a3a3a; padding-top:8px; margin-top:4px;">`;
            if (hasMore) {
                descHtml += `<span id="desc-short">${short} <span onclick="document.getElementById('desc-short').style.display='none'; document.getElementById('desc-full').style.display='block';" style="color:#888; font-size:0.78rem; cursor:pointer; text-decoration:underline;">read more</span></span>`;
                descHtml += `<span id="desc-full" style="display:none;">${data.plot} <span onclick="document.getElementById('desc-full').style.display='none'; document.getElementById('desc-short').style.display='block';" style="color:#888; font-size:0.78rem; cursor:pointer; text-decoration:underline;">read less</span></span>`;
            } else {
                descHtml += short;
            }
            descHtml += '</div>';
        }

        modalLinks.innerHTML = metaHtml + btns + descHtml;
    }

    function checkJellyfin(name, type) {
        const encoded = encodeURIComponent(name);
        fetch(`{{ url_for('main_bp.check_jellyfin', type='movie', name='placeholder') }}`.replace('movie', type).replace('placeholder', encoded))
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById('jf-status');
                if (el) {
                    if (data.exists) {
                        el.textContent = '✅ In Jellyfin';
                        el.style.color = '#4caf50';
                    } else {
                        el.textContent = '❌ Not in Jellyfin';
                        el.style.color = '#e57373';
                    }
                }
            })
            .catch(() => {
                const el = document.getElementById('jf-status');
                if (el) el.style.display = 'none';
            });
    }

    function loadVodInfo(streamId, icon, movieName) {
        const modalImage = document.getElementById("modal-image");
        const modalLinks = document.getElementById("modal-links");

        modalImage.innerHTML = icon ? `<img src="${icon}" style="max-width: 100%; max-height: 400px; display: block; margin: 0 auto;">` : '';
        modalLinks.innerHTML = `<span style="color:#999; font-size:0.85em;">Loading info...</span>`;

        fetch(`{{ url_for('main_bp.get_vod_info', stream_id=0) }}`.replace('/0', `/${streamId}`))
            .then(r => r.json())
            .then(data => {
                renderModalInfo(data, movieName, 'movie', modalLinks);
                checkJellyfin(movieName, 'movie');
            })
            .catch(() => { modalLinks.innerHTML = ''; });
    }

    document.addEventListener('DOMContentLoaded', function () {
        const modal = document.getElementById("myModal");
        const modalText = document.getElementById("modal-text");
        const modalImage = document.getElementById("modal-image");
        const modalLinks = document.getElementById("modal-links");
        const confirmBtn = document.getElementById("confirmBtn");
        const cancelBtn = document.getElementById("cancelBtn");
        const span = document.getElementsByClassName("close")[0];

        function closeModal() {
            modalImage.innerHTML = '';
            modalLinks.innerHTML = '';
            modal.style.display = "none";
        }

        document.querySelectorAll('.movie-link').forEach(link => {
            link.addEventListener('click', function () {
                const movieName = this.getAttribute('data-movie-name');
                const movieId = this.getAttribute('data-movie-id');
                const movieIcon = this.getAttribute('data-movie-icon');
                modalText.innerHTML = `Are you sure you want to add Movie '${movieName}'?`;
                modal.style.display = "block";
                loadVodInfo(movieId, movieIcon, movieName);
                confirmBtn.onclick = function () {
                    closeModal();
                    addMovieToServer(movieName, movieId);
                };
            });
        });

        document.querySelectorAll('.wanted-movie-link').forEach(link => {
            link.addEventListener('click', function () {
                const movieName = this.getAttribute('data-movie-name');
                modalText.innerHTML = `Are you sure you want to remove '${movieName}' from the wanted list?`;
                modalImage.innerHTML = "";
                modalLinks.innerHTML = "";
                modal.style.display = "block";
                confirmBtn.onclick = function () {
                    closeModal();
                    RemoveWantedMovie(movieName);
                };
            });
        });

        cancelBtn.onclick = closeModal;
        span.onclick = closeModal;
        window.onclick = function (event) {
            if (event.target == modal) closeModal();
        };

        document.getElementById('modal-image').addEventListener('click', function (e) {
            if (e.target.tagName === 'IMG') {
                const lb = document.getElementById('lightbox');
                document.getElementById('lightbox-img').src = e.target.src;
                lb.style.display = 'flex';
            }
        });
        document.getElementById('lightbox').addEventListener('click', function () {
            this.style.display = 'none';
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') document.getElementById('lightbox').style.display = 'none';
        });
    });

    function searchMovies() {
        let input = document.getElementById('search-bar').value.toLowerCase();
        document.querySelectorAll('#movies-list li').forEach(item => {
            let name = item.textContent || item.innerText;
            item.style.display = name.toLowerCase().includes(input) ? '' : 'none';
        });
    }
</script>

{% endblock %}
