{% extends 'layout.html' %}

{% block content %}

<div class="container">
    <div class="row">
        <div class="eight columns">
            <h4>Search and save movies</h4>
            <div id="main">
                <div class="search-container">
                    <input type="text" class="u-full-width" id="search-bar" placeholder="Search movies..."
                        onkeyup="searchMovies()">
                </div>
                <ul id="movies-list">
                    {% for movie in movies %}
                    <li><a href="#" class="movie-link" data-movie-name="{{ movie.name }}"
                            data-movie-id="{{ movie.stream_id }}" data-movie-icon="{{ movie.stream_icon }}">{{
                            movie.name }}</a></li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <div class="four columns">
            <div id="main">
                <h4>Watchlist</h4>
                <div>
                    <form method="POST" action="{{ url_for('main_bp.add_wanted_movie') }}">
                        <input type="text" class="u-full-width" id="wanted_movie" name="wanted_movie"
                            placeholder="Add movie to watchlist">
                    </form>
                </div>
                <ul id="wanted-movies-list">
                    {% for wanted_movie in wanted_movies %}
                    <li> <a href="javascript:void(0)" class="wanted-movie-link" style="text-decoration: none;"
                            data-movie-name="{{ wanted_movie }}">&#10060;</a> {{ wanted_movie }}
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>

<div id="player"></div>

<script>
    function hideFlashMessagesAfterDelay() {
        const flashMessages = document.querySelectorAll('.flash-message');
        flashMessages.forEach(flashMessage => {
            if (!flashMessage.classList.contains('static')) {
                setTimeout(() => {
                    flashMessage.style.opacity = '0';
                    setTimeout(() => flashMessage.remove(), 600);
                }, 5000);
            }
        });
    }

    function addMovieToServer(movieName, movieId) {
        fetch('{{ url_for("main_bp.add_movie_to_server") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ movieName, movieId }),
        })
        .then(response => response.json())
        .then(data => {
            var container = document.getElementById('flash-messages-container');
            var div = document.createElement('div');
            div.textContent = data.message;
            div.className = 'flash-message info';
            container.appendChild(div);
            hideFlashMessagesAfterDelay();
        })
        .catch(error => console.error('Error:', error));
    }

    function RemoveWantedMovie(movieName) {
        fetch('{{ url_for("main_bp.remove_wanted_movie") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ movieName }),
        })
        .then(response => response.json())
        .then(data => {
            location.reload();
            var container = document.getElementById('flash-messages-container');
            var div = document.createElement('div');
            div.textContent = data.message;
            div.className = 'flash-message info';
            container.appendChild(div);
            hideFlashMessagesAfterDelay();
        })
        .catch(error => console.error('Error:', error));
    }

    function loadVodInfo(streamId, icon) {
        const modalImage = document.getElementById("modal-image");
        const modalLinks = document.getElementById("modal-links");

        modalImage.innerHTML = icon ? `<img src="${icon}" style="max-width: 100%; max-height: 400px; display: block; margin: 0 auto;">` : '';
        modalLinks.innerHTML = `<span style="color:#999; font-size:0.85em;">Loading info...</span>`;

        fetch(`{{ url_for('main_bp.get_vod_info', stream_id=0) }}`.replace('/0', `/${streamId}`))
            .then(r => r.json())
            .then(data => {
                let pageUrl = null;
                let btns = '';
                if (data.tmdb_id) {
                    pageUrl = `https://www.themoviedb.org/movie/${data.tmdb_id}`;
                    btns += `<a href="${pageUrl}" target="_blank" class="button" style="margin-right:8px;">TMDB</a>`;
                }
                if (data.imdb_id) {
                    if (!pageUrl) pageUrl = `https://www.imdb.com/title/${data.imdb_id}`;
                    btns += `<a href="https://www.imdb.com/title/${data.imdb_id}" target="_blank" class="button">IMDB</a>`;
                }
                modalLinks.innerHTML = btns || '';
            })
            .catch(() => { modalLinks.innerHTML = ''; });
    }

    document.addEventListener('DOMContentLoaded', function () {
        const modal = document.getElementById("myModal");
        const modalText = document.getElementById("modal-text");
        const modalImage = document.getElementById("modal-image");
        const modalLinks = document.getElementById("modal-links");
        const confirmBtn = document.getElementById("confirmBtn");
        const cancelBtn = document.getElementById("cancelBtn");
        const span = document.getElementsByClassName("close")[0];

        function closeModal() {
            modalImage.innerHTML = '';
            modalLinks.innerHTML = '';
            modal.style.display = "none";
        }

        document.querySelectorAll('.movie-link').forEach(link => {
            link.addEventListener('click', function () {
                const movieName = this.getAttribute('data-movie-name');
                const movieId = this.getAttribute('data-movie-id');
                const movieIcon = this.getAttribute('data-movie-icon');
                modalText.innerHTML = `Are you sure you want to add Movie '${movieName}'?`;
                modal.style.display = "block";
                loadVodInfo(movieId, movieIcon);
                confirmBtn.onclick = function () {
                    closeModal();
                    addMovieToServer(movieName, movieId);
                };
            });
        });

        document.querySelectorAll('.wanted-movie-link').forEach(link => {
            link.addEventListener('click', function () {
                const movieName = this.getAttribute('data-movie-name');
                modalText.innerHTML = `Are you sure you want to remove '${movieName}' from the wanted list?`;
                modalImage.innerHTML = "";
                modalLinks.innerHTML = "";
                modal.style.display = "block";
                confirmBtn.onclick = function () {
                    closeModal();
                    RemoveWantedMovie(movieName);
                };
            });
        });

        cancelBtn.onclick = closeModal;
        span.onclick = closeModal;
        window.onclick = function (event) {
            if (event.target == modal) closeModal();
        };
    });

        document.getElementById('modal-image').addEventListener('click', function (e) {
            if (e.target.tagName === 'IMG') {
                const lb = document.getElementById('lightbox');
                document.getElementById('lightbox-img').src = e.target.src;
                lb.style.display = 'flex';
            }
        });
        document.getElementById('lightbox').addEventListener('click', function () {
            this.style.display = 'none';
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') document.getElementById('lightbox').style.display = 'none';
        });
    });

    function searchMovies() {
        let input = document.getElementById('search-bar').value.toLowerCase();
        document.querySelectorAll('#movies-list li').forEach(item => {
            let name = item.textContent || item.innerText;
            item.style.display = name.toLowerCase().includes(input) ? '' : 'none';
        });
    }
</script>

{% endblock %}
