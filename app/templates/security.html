{% extends 'layout.html' %}
{% block content %}
<div class="topbar"><span class="topbar-title">Security</span></div>
<div class="page-content">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div class="settings-section">
            <div class="settings-section-title">Admin Password</div>
            <form method="POST" action="{{ url_for('main_bp.change_admin_password') }}">
                <label>New Admin Password</label>
                <input class="filter-input" type="password" name="admin_password" placeholder="New admin password" required style="width:100%; margin-bottom:10px;">
                <button type="submit" class="button button-primary">Change Password</button>
            </form>
        </div>
        <div class="settings-section">
            <div class="settings-section-title">Playlist Password</div>
            <form method="POST" action="{{ url_for('main_bp.change_playlist_credentials') }}">
                <label>New Playlist Password</label>
                <input class="filter-input" type="password" name="playlist_password" placeholder="New playlist password" required style="width:100%; margin-bottom:10px;">
                <button type="submit" class="button button-primary">Change Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
