{% extends 'layout.html' %}
{% block content %}
<div class="topbar"><span class="topbar-title">Channel Groups</span></div>
<div class="page-content">
    <form method="POST" action="{{ url_for('main_bp.save_groups') }}">
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:16px;">
            <input type="text" class="filter-input" id="search-bar" placeholder="Search channel groups..." onkeyup="searchGroups()" style="flex:1;">
            <button type="submit" class="button button-primary">Save</button>
        </div>
        <div class="info-block">
            <ul id="groups-list" style="margin:0; padding:0; list-style:none;">
                {% if groups %}
                {% for group in groups %}
                <li class="group-li">
                    <input type="checkbox" id="{{ group|replace(' ','_')|replace('(','') |replace(')','') |replace('/','_') }}"
                        name="selected_groups[]" value="{{ group }}" {% if group in desired_group_titles %}checked{% endif %}>
                    <label for="{{ group|replace(' ','_')|replace('(','') |replace(')','') |replace('/','_') }}" style="margin:0; font-weight:400; color:#b0b0b0; font-size:13px; cursor:pointer;">{{ group }}</label>
                </li>
                {% endfor %}
                {% else %}
                <li style="padding:14px; color:#444; font-size:13px;">No channel groups found.</li>
                {% endif %}
            </ul>
        </div>
    </form>
</div>
<script>
function searchGroups() {
    const input = document.getElementById('search-bar').value.toLowerCase();
    document.querySelectorAll('#groups-list li').forEach(li => {
        li.style.display = (li.textContent||li.innerText).toLowerCase().includes(input) ? '' : 'none';
    });
}
</script>
{% endblock %}
